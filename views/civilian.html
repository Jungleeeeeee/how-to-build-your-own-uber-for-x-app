<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Гражданский: {{ userId }}</title>
    
    <!-- Локальное подключение библиотек из твоего проекта -->
    <link rel="stylesheet" href="/libs/leaflet/leaflet.css" />
    <script src="/libs/leaflet/leaflet.js"></script>
    <script src="/libs/axios/axios.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #map { width: 600px; height: 400px; margin-top: 10px; border: 1px solid #ccc; display: block; }
        button { padding: 10px 20px; font-weight: bold; background: #e74c3c; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body data-userId="{{ userId }}">
    <h1>Личный кабинет гражданина: {{ userId }}</h1>
    <h4 id="notification">Кликните по карте, чтобы указать место происшествия, и нажмите кнопку вызова.</h4>
    
    <button onclick="requestForHelp()">🚨 Вызвать экстренную помощь</button>
    <div id="map"></div>

    <script type="text/javascript">
        const socket = io();
        const userId = document.body.getAttribute("data-userId");

        socket.emit("join", { userId: userId });

        let requestDetails = {
            latitude: 12.9716,
            longitude: 77.5941,
            address: "Указанное место на карте"
        };

        const map = L.map('map').setView([requestDetails.latitude, requestDetails.longitude], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let marker = L.marker([requestDetails.latitude, requestDetails.longitude], {draggable: true}).addTo(map);

        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            marker.setLatLng([lat, lng]);
            requestDetails.latitude = lat;
            requestDetails.longitude = lng;
        });

        function requestForHelp() {
            axios.post('/requests/create', {
                civilianId: userId,
                location: {
                    latitude: requestDetails.latitude,
                    longitude: requestDetails.longitude,
                    address: requestDetails.address
                }
            })
            .then((response) => {
                document.getElementById("notification").innerHTML = "<b>Сигнал отправлен! Поиск ближайших экипажей полиции...</b>";
            })
            .catch((error) => {
                console.error("Ошибка отправки запроса:", error);
            });
        }

        socket.on("accepted", (copDetails) => {
            document.getElementById("notification").innerHTML = `
                <span style="color: green; font-weight: bold;">✅ Помощь уже в пути!</span><br>
                К вам направляется: <b>${copDetails.displayName}</b>. Телефон: ${copDetails.phone}
            `;
        });
    </script>
</body>
</html>
