<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Офицер {{ userId }}</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #map { width: 600px; height: 400px; margin-top: 10px; border: 1px solid #ccc; }
        button { padding: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body data-userId="{{ userId }}">
    <h1>Приветствуем, Офицер {{ userId }}</h1>
    <h2>Профиль:</h2>
    <div id="copDetails">Загрузка данных из базы...</div>

    <h4 id="notification">Ожидание запросов о помощи...</h4>

    <button onclick="helpCivilian()">Помочь гражданину</button>

    <div id="map"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>

    <script type="text/javascript">
        const socket = io();
        const userId = document.body.getAttribute("data-userId");

        socket.emit("join", { userId: userId });

        let requestDetails = {};
        let copDetails = {};
        let map, marker, civilianMarker;

        axios.get(`/cops/info?userId=${userId}`)
            .then((response) => {
                copDetails = response.data.copDetails;
                if (!copDetails) {
                    document.getElementById("copDetails").innerHTML = "<span style='color:red;'>Ошибка: Профиль копа не найден!</span>";
                    return;
                }

                const lat = copDetails.location.coordinates[1];
                const lng = copDetails.location.coordinates[0];

                copDetails.location = {
                    address: copDetails.location.address,
                    latitude: lat,
                    longitude: lng
                };

                document.getElementById("copDetails").innerHTML = `
                    <b>Имя:</b> ${copDetails.displayName} <br>
                    <b>Адрес дежурства:</b> ${copDetails.location.address}
                `;

                map = L.map('map').setView([lat, lng], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                marker = L.marker([lat, lng]).addTo(map).bindPopup('Вы здесь').openPopup();
            })
            .catch((error) => {
                console.error("Ошибка запроса инфо о копе:", error);
            });

        socket.on("request-for-help", (eventData) => {
            requestDetails = eventData;

            document.getElementById("notification").innerHTML = `
                <span style="color: red; font-weight: bold;">🚨 Срочный вызов!</span> <br>
                На гражданина ${requestDetails.civilianId} совершено нападение!<br>
                <b>Координаты:</b> ${requestDetails.location.latitude.toFixed(4)}, ${requestDetails.location.longitude.toFixed(4)}
            `;

            if (civilianMarker) map.removeLayer(civilianMarker);
            
            civilianMarker = L.marker([requestDetails.location.latitude, requestDetails.location.longitude]).addTo(map)
                .bindPopup(`<b>Пострадавший: ${requestDetails.civilianId}</b>`).openPopup();
                
            map.setView([requestDetails.location.latitude, requestDetails.location.longitude], 13);
        });

        function helpCivilian() {
            if (!requestDetails || !requestDetails.civilianId) {
                alert("В данный момент нет активных вызовов!");
                return;
            }
            socket.emit("request-accepted", {
                requestDetails: requestDetails,
                copDetails: copDetails
            });
            document.getElementById("notification").innerHTML = "✅ Вы приняли вызов. Направляйтесь к цели!";
        }
    </script>
</body>
</html>
